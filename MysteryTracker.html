    document.querySelectorAll(`td[data-col="${currentCol}"]`).forEach(td => td.classList.add('active-turn'));
}

function applyColLock(locked) {
    // locked = true means shift mode is active, lock all except current player col
    for (let c = 0; c < 6; c++) {
        const th  = document.getElementById('th' + c);
        const tds = document.querySelectorAll(`td[data-col="${c}"]`);
        if (locked && c !== getCurrentCol()) {
            if (th) th.classList.add('col-locked');
            tds.forEach(td => td.classList.add('col-locked'));
        } else {
            if (th) th.classList.remove('col-locked');
            tds.forEach(td => td.classList.remove('col-locked'));
        }
    }
}

// ═══════════════════════════════════════════════════════════════════
// PLAYER / TURN HELPERS
// ═══════════════════════════════════════════════════════════════════
function getPlayerNames() {
    const names = [];
    for (let i = 1; i <= 6; i++) {
        const el = document.getElementById('p' + i + 'h');
        names.push(el && el.value.trim() ? el.value.trim() : '');
    }
    return names;
}

function findMeCol() {
    const names = getPlayerNames();
    for (let i = 0; i < names.length; i++) {
        if (names[i].toLowerCase() === 'me') return i;
    }
    return -1;
}

// Returns ordered list of col indices that have non-empty names entered
function buildTurnOrder() {
    const names = getPlayerNames();
    const order = [];
    for (let i = 0; i < names.length; i++) {
        if (names[i] && names[i].trim() !== '') order.push(i);
    }
    return order;
}

function getCurrentCol() {
    // Safety: rebuild turnOrder from names if somehow empty during play
    if (turnOrder.length === 0 && gamePhase === 'play') {
        turnOrder = buildTurnOrder();
        turnStep  = 0;
    }
    if (turnOrder.length === 0) return 0;
    return turnOrder[turnStep % turnOrder.length];
}

function getCurrentPlayerName() {
    const names = getPlayerNames();
    return names[getCurrentCol()] || ('Player ' + (getCurrentCol() + 1));
}

function getColName(col) {
    const names = getPlayerNames();
    return names[col] || ('Player ' + (col + 1));
}

// SETUP PHASE
// ═══════════════════════════════════════════════════════════════════
function applyInactiveColStyling() {
    for (let c = 0; c < 6; c++) {
        const name = getColName(c);
        const th = document.getElementById('th' + c);
        const tds = document.querySelectorAll(`td[data-col="${c}"]`);
        const isEmpty = !name || name.trim() === '';
        if (th)  isEmpty ? th.classList.add('col-inactive')  : th.classList.remove('col-inactive');
        tds.forEach(td => isEmpty ? td.classList.add('col-inactive') : td.classList.remove('col-inactive'));
    }
}

function onNameChange() {
    if (gamePhase === 'setup') {
        const mc = findMeCol();
        meCol = mc;
        applyMeColStyling(); applyInactiveColStyling(); applyBlankColLock();
    }
    applyInactiveColStyling();
    renderInfoBar();
    updatePhaseBarText();
    updateButtonStates();
    autoSave();
}
function startGame() {
    const mc = findMeCol();
    if (mc < 0) { showStatus('Type "Me" in your seat column first.', 'var(--red-lt)'); return; }
    const order = buildTurnOrder();
    if (order.length < 2) { showStatus('Enter at least 2 player names.', 'var(--red-lt)'); return; }

    meCol     = mc;
    turnOrder = order;
    turnStep  = 0;
    turnCount = 1;
    gamePhase = 'play';
    // Lock name and card-count inputs
    for (let i = 1; i <= 6; i++) {
        const elH = document.getElementById('p' + i + 'h');
        const elC = document.getElementById('p' + i + 'c');
        if (elH) elH.disabled = true;
        if (elC) elC.disabled = true;
    }
    for (let c = 0; c < 6; c++) {
        const th = document.getElementById('th' + c);
        if (th) th.classList.add('in-play');
    }
    refreshCardCountDisplays();
    applyPlayerOutBadges();

    applyMeColStyling(); applyInactiveColStyling(); applyBlankColLock();
    applyActiveTurnStyling(); applyPlayLocks();
    updateCardLabels();       // lock card name inputs
    updateCategoryBanners();  // lock category banner inputs
    updateStage();
    // ✗ rest of row for any card Me has, and ✗ Me's column for cards Me doesn't have.
    // These are SETUP-derived marks — even though gamePhase is now 'play',
    // they should carry turn tag 0 because they represent what was known at start.
    ALL_CARDS.forEach(card => {
        if (!cellState[card][meCol].check) {
            markCell(card, meCol, 'cross', { turn: 0 });
        } else {
            turnOrder.forEach(c => {
                if (c === meCol) return;
                if (mutedPlayers.has(c)) return;
                if (!canAutoX(card, c)) return;
                markCell(card, c, 'cross', { turn: 0 });
            });
        }
    });
    renderAllCells();

    document.getElementById('setupBanner').classList.add('game-on');
    updateDeckBarVisibility();
    updateButtonStates();
    renderInfoBar();
    showStatus('Game started! Good luck 🔍', 'var(--green-lt)');
    autoSave();
}

function editSetup() {
    if (gameLog.length > 0) {
        modalConfirm({
            title: 'Return to setup?',
            message: 'Game progress will be cleared. Your cards will be kept.',
            okLabel: 'Return to Setup', danger: true, confirmTwoTap: true,
            onConfirm: _doEditSetup
        });
        return;
    }
    _doEditSetup();
}
function _doEditSetup() {
    // Clear game data, keep Me cards
    gameLog = []; undoStack = []; typingUndoStack = []; solutionCards = new Set();
    turnStep = 0; turnCount = 1;
    setupStep = 1;

    // Clear non-Me cells
    ALL_CARDS.forEach(card => {
        for (let c = 0; c < 6; c++) {
            if (c !== meCol)
                cellState[card][c] = { check:false, cross:false, asked:false, showed:false, shownToMe:false, meShowedTo:'', iShowedMe:false };
        }
    });

    gamePhase = 'setup';
    for (let i = 1; i <= 6; i++) {
        const elH = document.getElementById('p' + i + 'h');
        const elC = document.getElementById('p' + i + 'c');
        if (elH) elH.disabled = false;
        if (elC) elC.disabled = false;
    }
    for (let c = 0; c < 6; c++) {
        const th = document.getElementById('th' + c);
        if (th) { th.classList.remove('in-play'); th.classList.remove('player-out'); }
    }
    mutedPlayers = new Set();
    document.getElementById('setupBanner').classList.remove('game-on');
    updateDeckBarVisibility();
    updateButtonStates();
    clearPending();
    applyActiveTurnStyling(); applyPlayLocks();
    updateCardLabels();       // unlock card name inputs
    updateCategoryBanners();  // unlock category banner inputs
    renderAllCells(); renderFullLog(); renderSolutionFlags(); renderInfoBar(); updateUndoButton();
    showStatus('Back in setup mode.', 'var(--green-lt)');
    autoSave();
}

// ═══════════════════════════════════════════════════════════════════
// CELL CLICK
// ═══════════════════════════════════════════════════════════════════
function onCellClick(e) {
    e.preventDefault(); e.stopPropagation();
    const td   = e.currentTarget;
    const card = td.dataset.card;
    const col  = parseInt(td.dataset.col);

    // ── SETUP: only Me column, toggle ✓ ──
    if (gamePhase === 'setup') {
        if (meCol < 0) { showStatus('Type "Me" in your seat column first.', 'var(--red-lt)'); return; }
        if (col !== meCol) { showStatus('During setup, only your "Me" column can be marked.', 'var(--red-lt)'); return; }
        const s = cellState[card][col];
        if (s.check) {
            // Toggle off: drop all 'check' marks and any auto-X effects from this card
            s.marks = (s.marks || []).filter(m => m.type !== 'check');
            recomputeCellBooleans(card, col);
        } else {
            markCell(card, col, 'check');
        }
        renderCell(card, col);
        updateUndoButton();
        autoSave(); return;
    }

    const currentCol = getCurrentCol();
    const isMyTurn   = (currentCol === meCol);
    const hasAsked   = committedAsked.length > 0;
    const hasShowed  = pendingShowed.length > 0 || committedShowedUndo.length > 0;

    // Block clicks on inactive columns during play
    if (gamePhase === 'play' && !turnOrder.includes(col)) return;

    // Block col-locked cells in JS (CSS has no pointer-events, all blocking is here)
    if (gamePhase === 'play' && td.classList.contains('col-locked')) return;

    // ── THINKING stage: click current player's column = mark Asked ──
    if (!hasAsked && !hasShowed) {
        if (col !== currentCol) {
            showStatus('Click a card in the current player\'s column to mark Asked.', 'var(--red-lt)'); return;
        }
        if (pendingAsked.find(p => p.card === card)) return;
        if (mutedCards.has(card)) { showStatus('This card is muted — double-click it to activate.', 'var(--red-lt)'); return; }
        const askLimit = activeCategoryCount(); // M2: one card per ACTIVE category
        if (pendingAsked.length >= askLimit) { showStatus(`Max ${askLimit} card${askLimit===1?'':'s'} per guess.`, 'var(--red-lt)'); return; }

        // Save old state for granular undo
        const old = { ...cellState[card][col], marks:[...(cellState[card][col].marks||[])] };
        markCell(card, col, 'asked');
        renderCell(card, col);
        td.classList.add('pending-ask');
        pendingAsked.push({ card, col, old });
        applyColLock(true);

        // After all category-cards selected — auto-commit and advance to waiting
        // Keep column lock so active turn column stays highlighted
        if (pendingAsked.length === askLimit) {
            // Don't unlock — keep other columns locked during waiting stage
            pendingAsked.forEach(p => {
                committedAskedUndo.push({ card: p.card, col: p.col, old: p.old });
                const ptd = document.querySelector(`td[data-card="${CSS.escape(p.card)}"][data-col="${p.col}"]`);
                if (ptd) ptd.classList.remove('pending-ask');
            });
            committedAsked = [...pendingAsked];
            pendingAsked   = [];

            // Highlight cells with ✓ on asked cards
            committedAsked.forEach(p => {
                for (let c = 0; c < 6; c++) {
                    if (!turnOrder.includes(c)) continue;
                    const s = cellState[p.card][c];
                    if (s.check || s.shownToMe) {
                        const htd = document.querySelector(`td[data-card="${CSS.escape(p.card)}"][data-col="${c}"]`);
                        if (htd) htd.classList.add('asked-has-card');
                    }
                }
            });

            // Live log entry
            liveLogEntry = {
                turn: turnCount, playerIdx: currentCol, player: getCurrentPlayerName(),
                isMe: isMyTurn, asked: committedAsked.map(p => p.card),
                showerName: '', shownMe: [], iShowed: [], live: true
            };
            renderFullLog();

            // Push partial snapshot
            pushUndo({ turnStep, turnCount, cellChanges: [...committedAskedUndo],
                solutionCards: new Set(solutionCards), partial: true, stage: 'asked' });

            applyPlayLocks();
        }

        updateModeBar(); updateStage(); updateUndoButton(); applyPlayLocks(); renderInfoBar(); autoSave(); return;
    }

    // ── WAITING stage ──
    // Patrick rule: clicks in any cell do NOT mark a show. The show flows are
    // popup-only — triggered by clicking the appropriate player-name HEADER.
    //   • Me-as-asker: click the shower's name header → popup picks the card.
    //   • Me-as-shower: click Me's own header → popup picks the card.
    // A cell click during WAITING just shows a hint and is ignored otherwise.
    if (hasAsked && !hasShowed) {
        if (isMyTurn) {
            showStatus("Click the name at the top of the column of the player who showed — the popup will ask which card.", 'var(--red-lt)');
        } else {
            showStatus("Click your own 'Me' header to record what you showed — the popup will list your held cards.", 'var(--red-lt)');
        }
        return;
    }
}

// ═══════════════════════════════════════════════════════════════════
// ── Clicking a player name header cell = mark showed (commits immediately) ──
document.getElementById('headerRow').addEventListener('click', e => {
    if (gamePhase !== 'play') return;
    // Find the th — target could be text node or input inside
    let th = e.target;
    if (th.tagName !== 'TH') th = th.closest('th');
    if (!th || !th.id || !th.id.startsWith('th')) return;
    const col = parseInt(th.id.replace('th', ''));
    if (isNaN(col)) return;

    // Block inactive columns (not in turnOrder)
    if (!turnOrder.includes(col)) return;

    // M5: Block muted (Out) players — they can't be the shower
    if (mutedPlayers.has(col)) {
        showStatus(`${getColName(col)} is Out — they can't show a card.`, 'var(--red-lt)');
        return;
    }

    // GUARD (mobile parity): asker cannot also be the shower.
    if (col === getCurrentCol()) {
        showStatus(`${getColName(col)} is asking — cannot also show.`, 'var(--red-lt)');
        return;
    }

    // GUARD #6: clicked column has ✗ on every asked card — they can't be the shower.
    // Applies universally (including Me's column — Me with ✗ on all asked means Me holds none).
    if (committedAsked.length > 0) {
        const allCrossed = committedAsked.every(p =>
            cellState[p.card] && cellState[p.card][col] && cellState[p.card][col].cross
        );
        if (allCrossed) {
            showStatus(`${getColName(col)} has ❌ on all asked cards — cannot show.`, 'var(--red-lt)');
            return;
        }
    }

    // GUARD #2: sequence check. Walking the ring from asker+1, if an earlier player
    // is obligated to show (has ✓ on any asked card) and the clicked column comes
    // after them, reject — the earlier player must show first.
    if (committedAsked.length > 0) {
        const askerCol = getCurrentCol();
        const n        = turnOrder.length;
        const askerIdx = turnOrder.indexOf(askerCol);
        const colIdx   = turnOrder.indexOf(col);
        if (askerIdx >= 0 && colIdx >= 0) {
            const colPos = ((colIdx - askerIdx - 1 + n) % n);
            for (let i = 1; i < n; i++) {
                const c = turnOrder[(askerIdx + i) % n];
                if (c === askerCol)        continue;
                if (mutedPlayers.has(c))   continue;
                const mustShow = committedAsked.some(p =>
                    cellState[p.card] && cellState[p.card][c] && cellState[p.card][c].check
                );
                if (mustShow) {
                    const mustShowPos = ((turnOrder.indexOf(c) - askerIdx - 1 + n) % n);
                    if (colPos > mustShowPos) {
                        showStatus(`${getColName(c)} must show first — they have a card.`, 'var(--red-lt)');
                        return;
                    }
                    break; // first must-show found; later players are unaffected
                }
            }
        }
    }

    // M5+: Me-as-asker — click another player's header to record they showed
    if (getCurrentCol() === meCol) {
        if (col === meCol) return; // ignore own header on own turn
        if (committedAsked.length === 0) {
            showStatus(`Click ${activeCategoryCount()} cards in your own column first.`, 'var(--red-lt)'); return;
        }
        openMeAskerPicker(col, committedAsked.map(p => p.card));
        return;
    }

    // M5+: Me-as-shower — click Me's own header during another player's turn
    if (col === meCol) {
        if (committedAsked.length === 0) {
            showStatus(`Wait until ${getCurrentPlayerName()} has asked ${activeCategoryCount()} cards.`, 'var(--red-lt)'); return;
        }
        openMeShowerPicker(getCurrentCol(), committedAsked.map(p => p.card));
        return;
    }

    // Block locked headers
    if (th.classList.contains('col-locked')) return;

    if (committedAsked.length === 0 && pendingAsked.length === 0) {
        showStatus(`Click ${activeCategoryCount()} card${activeCategoryCount()===1?'':'s'} in the current player's column first.`, 'var(--red-lt)'); return;
    }
    if (pendingAsked.length > 0) commitAsked();

    // Toggle — clicking same header again undoes showed marks
    if (pendingShowed.length > 0 && pendingShowed[0].col === col) {
        // Full rollback of committed showed + auto-✗
        committedShowedUndo.forEach(({ card, col: c, old }) => {
            cellState[card][c] = { ...old };
            renderCell(card, c);
        });
        committedShowedUndo = [];
        pendingShowed.forEach(p => {
            const td = document.querySelector(`td[data-card="${CSS.escape(p.card)}"][data-col="${p.col}"]`);
            if (td) td.classList.remove('pending-show');
        });
        pendingShowed = [];
        updateModeBar(); updateStage(); renderInfoBar(); return;
    }

    // Clear any previous showed selection — rollback first
    if (pendingShowed.length > 0) {
        committedShowedUndo.forEach(({ card, col: c, old }) => {
            cellState[card][c] = { ...old };
            renderCell(card, c);
        });
        committedShowedUndo = [];
        pendingShowed.forEach(p => {
            const td = document.querySelector(`td[data-card="${CSS.escape(p.card)}"][data-col="${p.col}"]`);
            if (td) td.classList.remove('pending-show');
        });
        pendingShowed = [];
    }

    // Immediately apply S marks and auto-✗ passing players
    const showerCol = col;
    committedShowedUndo = []; // fresh slate

    committedAsked.forEach(p => {
        // Save old state of shower's cell
        committedShowedUndo.push({ card: p.card, col: showerCol, old: { ...cellState[p.card][showerCol], marks:[...(cellState[p.card][showerCol].marks||[])] } });
        markCell(p.card, showerCol, 'showed');
        renderCell(p.card, showerCol);
        pendingShowed.push({ card: p.card, col: showerCol, committed: true });

        // Auto-✗ players who passed (between asker and shower in turn order)
        // M5: skip Out players in the ring
        const n        = turnOrder.length;
        const askerIdx = turnOrder.indexOf(getCurrentCol());
        let i     = (askerIdx + 1) % n;
        let steps = 0;
        while (turnOrder[i] !== showerCol && steps < n) {
            if (!mutedPlayers.has(turnOrder[i])) {
                applyAutoX(p.card, turnOrder[i], committedShowedUndo);
            }
            i = (i + 1) % n;
            steps++;
        }
    });

    // Update live log entry with shower
    if (liveLogEntry) {
        liveLogEntry.showerName = getColName(showerCol);
        renderFullLog();
    }
    updateModeBar(); updateStage(); updateUndoButton(); renderInfoBar(); autoSave();
});

// ═══════════════════════════════════════════════════════════════════
// TURN STAGE INDICATOR
// ═══════════════════════════════════════════════════════════════════
function updateStage() {
    updatePhaseBarText();
    updateButtonStates();
    const el    = document.getElementById('ibStage');
    const nameEl= document.getElementById('ibPlayerName');
    if (!el || gamePhase !== 'play') return;
    const isMe      = (getCurrentCol() === meCol);
    const name      = getCurrentPlayerName();
    const hasShowed = pendingShowed.length > 0;
    const hasAlt    = pendingShownMe.some(p => p.committed) || pendingIShowed.some(p => p.committed);
    const isEndTurn = hasShowed || hasAlt;

    if (pendingAsked.length > 0) {
        if (nameEl) nameEl.textContent = isMe ? 'I' : '▶ ' + name;
        el.className = 'ib-stage guessing';
        el.textContent = isMe ? 'am guessing' : 'is guessing';
    } else if (committedAsked.length > 0 && !isEndTurn) {
        if (nameEl) nameEl.textContent = isMe ? 'I' : '▶ ' + name;
        el.className = 'ib-stage waiting';
        el.textContent = isMe ? 'am waiting' : 'is waiting for answer';
    } else if (isEndTurn) {
        if (nameEl) nameEl.textContent = isMe ? 'Your' : '▶ ' + name + "'s";
        el.className = 'ib-stage endturn';
        el.textContent = 'End of turn';
    } else {
        if (nameEl) nameEl.textContent = isMe ? '🔍 My Turn' : '▶ ' + name;
        el.className = 'ib-stage thinking';
        el.textContent = isMe ? 'others are waiting 🤔' : 'is thinking 🤔';
    }
}
function updateModeBar() {
    const el = document.getElementById('modeText');
    if (!el) return; // M5+: modeText was retired from the Phase Bar refactor — function is now a no-op
    const hasAsk       = pendingAsked.length > 0;
    const hasCommitted = committedAsked.length > 0;
    const hasShow      = pendingShowed.length > 0;
    const hasShownMe   = pendingShownMe.length > 0;
    const hasIShowed   = pendingIShowed.length > 0;

    el.className = 'ibc-mode';
    if (hasAsk) {
        el.className += ' mode-asking';
        el.textContent = `Shift: ${pendingAsked.length}/${activeCategoryCount()} cards — release Shift to log`;
    } else if (hasCommitted && !hasShow) {
        el.className += ' mode-asking';
        el.textContent = `Asked logged (${committedAsked.length}) — click player name who showed, or Next Player`;
    } else if (hasShow) {
        el.className += ' mode-showing';
        el.textContent = `Showed marked — click Next Player to commit`;
    } else if (hasShownMe || hasIShowed) {
        el.className += ' mode-shownme';
        el.textContent = `Alt marked — click Next Player to commit`;
    } else {
        el.textContent = '';
    }
}

// ═══════════════════════════════════════════════════════════════════
// CLEAR PENDING
// ═══════════════════════════════════════════════════════════════════
function clearPending() {
    [...pendingAsked, ...pendingShowed, ...pendingShownMe, ...pendingIShowed].forEach(p => {
        const c = p.col !== undefined ? p.col : 0;
        const td = document.querySelector(`td[data-card="${CSS.escape(p.card)}"][data-col="${c}"]`);
        if (td) td.classList.remove('pending-ask', 'pending-show', 'pending-shownme');
    });
    document.querySelectorAll('td.asked-has-card').forEach(td => td.classList.remove('asked-has-card'));
    pendingAsked = []; committedAsked = []; committedAskedUndo = []; committedShowedUndo = []; committedAltUndo = [];
    pendingShowed = []; pendingShownMe = []; pendingIShowed = [];
    liveLogEntry = null;
    applyColLock(false);
    applyPlayLocks();
    updateModeBar(); updateStage(); updateUndoButton(); renderInfoBar();
}

// ═══════════════════════════════════════════════════════════════════
// AUTO ✗ HELPERS
// ═══════════════════════════════════════════════════════════════════
function canAutoX(card, col) {
    const s = cellState[card][col];
    // Patrick's rule: the first ✗ wins — no stacking. A cell already marked stays as-is.
    if (s.shownToMe) return false; // confirmed shown to me
    if (s.check)     return false; // has this card (includes Me's setup cards)
    if (s.cross)     return false; // already Xed — keep the original turn tag
    return true; // blank, A, S are overwritable
}

function applyAutoX(card, col, undoList) {
    if (!canAutoX(card, col)) return;
    const old = { ...cellState[card][col], marks:[...(cellState[card][col].marks||[])] };
    undoList.push({ card, col, old });
    markCell(card, col, 'cross');
    renderCell(card, col);
}

// ═══════════════════════════════════════════════════════════════════
// SOLUTION FLAGS
// ═══════════════════════════════════════════════════════════════════
function isSolutionCandidate(card) {
    // A card is a solution candidate when every active player has ✗
    // (nobody confirmed to have it)
    for (let i = 0; i < turnOrder.length; i++) {
        const c = turnOrder[i];
        const s = cellState[card][c];
        if (s.check || s.shownToMe) return false; // someone has it
        if (!s.cross) return false; // not yet ruled out for this player
    }
    return true;
}

function updateSolutionFlags(cards) {
    let changed = false;
    cards.forEach(card => {
        const was = solutionCards.has(card);
        const is  = isSolutionCandidate(card);
        if (is && !was)  { solutionCards.add(card);    changed = true; }
        if (!is && was)  { solutionCards.delete(card); changed = true; }
    });
    if (changed) renderSolutionFlags();
}

function renderSolutionFlags() {
    // M2: Solution flashing was retired with the design (per Gemini conversation).
    // Function kept as a no-op so existing call sites do not break.
    // Simple coloring for cards still in the solutionCards set, no flash animation.
    document.querySelectorAll('tbody tr th[data-card]').forEach(th => {
        const card = th.dataset.card;
        const flag = th.querySelector('.sol-flag');
        if (solutionCards.has(card)) {
            th.style.color = 'var(--red)'; th.style.fontWeight = '700';
            if (!flag) { const sp = document.createElement('span'); sp.className = 'sol-flag'; sp.textContent = ' 🔍'; th.appendChild(sp); }
        } else {
            th.style.color = ''; th.style.fontWeight = '';
            th.classList.remove('sol-flash-green','sol-flash-red');
            if (flag) th.removeChild(flag);
        }
    });
}

// ═══════════════════════════════════════════════════════════════════
// UNDO STAGE
// ═══════════════════════════════════════════════════════════════════
function pushUndo(snap) {
    undoStack.push(snap);
    updateUndoButton();
}

function updateUndoButton() {
    // M5+: button is always visible; updateButtonStates handles the enabled/disabled state.
    updateButtonStates();
    updatePhaseBarText();
}

// M5+: scan cellState for any mark with a specific turn tag
function hasMarksForTurn(turn) {
    for (const card of ALL_CARDS) {
        for (let c = 0; c < 6; c++) {
            const cs = cellState[card] && cellState[card][c];
            if (!cs) continue;
            if ((cs.marks || []).some(m => m.turn === turn)) return true;
        }
    }
    return false;
}

// M5+: remove all marks with a specific turn tag, then resync booleans
function removeMarksForTurn(turn) {
    ALL_CARDS.forEach(card => {
        for (let c = 0; c < 6; c++) {
            const cs = cellState[card] && cellState[card][c];
            if (!cs) continue;
            cs.marks = (cs.marks || []).filter(m => m.turn !== turn);
            recomputeCellBooleans(card, c);
        }
    });
}

function undoStage() {
    // ── Setup phase: Undo = anti-Next. Step back one wizard step; all data preserved. ──
    if (gamePhase === 'setup') {
        if (setupStep <= 1) {
            showStatus('Nothing more to undo.', 'var(--gold-dk)');
            return;
        }
        setupStep--;
        clearTypingUndo(); // entering a new step — typing stack is step-scoped
        updatePhaseBarText();
        updateButtonStates(); // also refreshes tab indexes
        showStatus(`Returned to Step ${setupStep}.`, 'var(--text)');
        autoSave();
        return;
    }

    // ── Play phase: rewind one whole turn — wrapped in a two-tap confirm (mobile parity) ──
    const inProgressNow = pendingAsked.length > 0 || committedAsked.length > 0 ||
                          pendingShowed.length > 0 || pendingShownMe.length > 0 ||
                          pendingIShowed.length > 0 || hasMarksForTurn(turnCount);

    if (!inProgressNow && turnCount <= 1) {
        showStatus('Nothing more to undo.', 'var(--gold-dk)');
        return;
    }

    const title   = inProgressNow ? 'Undo this turn' : 'Previous turn';
    const message = inProgressNow
        ? `Clear all marks placed on turn ${turnCount}?`
        : `Roll back to turn ${turnCount - 1}? All marks placed on turn ${turnCount - 1} will be removed and the turn pointer will step back one player.`;
    const okLabel = inProgressNow ? 'Undo' : 'Roll back';

    modalConfirm({
        title, message, okLabel, confirmTwoTap: true,
        onConfirm: () => _doPlayUndo(inProgressNow)
    });
}

function _doPlayUndo(inProgressNow) {
    if (inProgressNow) {
        // Step 1: clear everything placed in the current turn — back to start of this turn
        removeMarksForTurn(turnCount);
    } else {
        // Step 2: nothing in this turn — rewind to the previous turn
        turnCount--;
        removeMarksForTurn(turnCount);
        if (gameLog.length > 0) gameLog.pop();
        turnStep = (turnStep - 1 + turnOrder.length) % turnOrder.length;
        let safety = 0;
        while (mutedPlayers.has(turnOrder[turnStep]) && safety < turnOrder.length) {
            turnStep = (turnStep - 1 + turnOrder.length) % turnOrder.length;
            safety++;
        }
    }
    clearPending();
    committedAsked = []; committedAskedUndo = [];
    pendingShowed  = []; committedShowedUndo = [];
    pendingShownMe = []; pendingIShowed = []; committedAltUndo = [];
    liveLogEntry = null;
    applyColLock(false);
    document.querySelectorAll('td.asked-has-card, td.pending-ask, td.pending-show, td.pending-shownme').forEach(td => {
        td.classList.remove('asked-has-card','pending-ask','pending-show','pending-shownme');
    });
    renderAllCells(); renderFullLog();
    applyActiveTurnStyling(); updateStage(); updateUndoButton(); applyPlayLocks(); renderInfoBar();
    showStatus(inProgressNow ? 'Undo: back to start of this turn.' : `Undo: rewound to turn ${turnCount}.`, 'var(--text)');
    autoSave();
}

// ═══════════════════════════════════════════════════════════════════
// NEXT PLAYER
// ═══════════════════════════════════════════════════════════════════
function nextPlayer() {
    // M5+: in setup, Next advances the wizard step (no game state change).
    if (gamePhase === 'setup') {
        if (setupStep < 5) {
            setupStep++;
            clearTypingUndo(); // entering a new step — typing stack is step-scoped
            updatePhaseBarText();
            updateButtonStates();
            autoSave();
        }
        return;
    }
    if (gamePhase !== 'play') return;

    const askerCol   = getCurrentCol();
    const askerName  = getCurrentPlayerName();
    const isMe       = (askerCol === meCol);
    const askedCards = committedAsked.map(p => p.card);
    const showerCol  = pendingShowed.length > 0 ? pendingShowed[0].col : -1;
    const showerName = showerCol >= 0 ? getColName(showerCol) : '';
    const hasData    = askedCards.length > 0 || pendingShowed.length > 0 ||
                       pendingShownMe.length > 0 || pendingIShowed.length > 0;

    // GUARD #3 (mobile parity): "nobody showed" sequence guard.
    // If there's a committed guess and no shower has been recorded, walk the ring
    // from asker+1. If any non-asker, non-Out player has ✓ on an asked card, they're
    // obligated to show — reject Next instead of auto-✗-ing everyone.
    const noShowYet = showerCol === -1 && pendingShownMe.length === 0 && pendingIShowed.length === 0;
    if (askedCards.length > 0 && noShowYet) {
        const askerIdx = turnOrder.indexOf(askerCol);
        const n        = turnOrder.length;
        if (askerIdx >= 0) {
            for (let i = 1; i < n; i++) {
                const c = turnOrder[(askerIdx + i) % n];
                if (c === askerCol)      continue;
                if (mutedPlayers.has(c)) continue;
                const mustShow = askedCards.some(card =>
                    cellState[card] && cellState[card][c] && cellState[card][c].check
                );
                if (mustShow) {
                    showStatus(`${getColName(c)} must show first — they have a confirmed card.`, 'var(--red-lt)');
                    return;
                }
            }
        }
    }

    // Save snapshot for undo BEFORE changes
    // Include asked undo entries + showed/auto-X entries from header click
    const cellChangesBefore = [...committedAskedUndo, ...committedShowedUndo, ...committedAltUndo];
    const snapSolutionCards = new Set(solutionCards);
    const snapTurnStep      = turnStep;
    const snapTurnCount     = turnCount;

    // Apply showed marks (skip if already committed via header click)
    pendingShowed.forEach(p => {
        if (!p.committed) {
            cellChangesBefore.push({ card: p.card, col: p.col, old: { ...cellState[p.card][p.col], marks:[...(cellState[p.card][p.col].marks||[])] } });
            markCell(p.card, p.col, 'showed');
            renderCell(p.card, p.col);
        }
        // If committed, already applied and already in committedShowedUndo
    });

    // Apply shown-to-me — skip if already committed via plain click in onCellClick
    pendingShownMe.forEach(p => {
        if (!p.committed) {
            const s = cellState[p.card][p.col];
            cellChangesBefore.push({ card: p.card, col: p.col, old: { ...s, marks:[...(s.marks||[])] } });
            markCell(p.card, p.col, 'check');
            markCell(p.card, p.col, 'shownToMe');
            renderCell(p.card, p.col);
            // ✓ in any column → ✗ in the rest of the row (skip Me; skip already-marked).
            applyAutoXOnCheck(p.card, p.col);
        }
        // M5+: skip auto-✗ if the popup/handler already did the ring-loop immediately.
        if (p.autoXDone) return;
        const n        = turnOrder.length;
        const askerCol = meCol;
        const askerIdx = turnOrder.indexOf(askerCol);
        const allAsked = committedAsked.map(q => q.card);
        let i = (askerIdx + 1) % n;
        let steps = 0;
        while (turnOrder[i] !== p.col && steps < n) {
            if (!mutedPlayers.has(turnOrder[i])) {
                allAsked.forEach(ac => applyAutoX(ac, turnOrder[i], cellChangesBefore));
            }
            i = (i + 1) % n;
            steps++;
        }
    });

    // Apply I-showed — skip if already committed, mark in asker's column
    pendingIShowed.forEach(p => {
        if (!p.committed) {
            // p.col is already the askerCol (set in onCellClick)
            const s = cellState[p.card][p.col];
            cellChangesBefore.push({ card: p.card, col: p.col, old: { ...s, marks:[...(s.marks||[])] } });
            markCell(p.card, p.col, 'iShowedMe');
            renderCell(p.card, p.col);
        }
        // No auto-X — showing a card doesn't tell us who else has it
    });

    // ── AUTO ✗ ── (only if not already applied via header click)
    const specificCardShown = pendingShownMe.length > 0 || pendingIShowed.length > 0;
    if (askedCards.length > 0) {
        if (committedShowedUndo.length === 0 && !specificCardShown) {
            const n = turnOrder.length;
            askedCards.forEach(card => {
                if (showerCol === -1) {
                    // Nobody showed → ✗ everyone EXCEPT the asker (and Out players)
                    turnOrder.forEach(c => {
                        if (c === askerCol) return;
                        if (mutedPlayers.has(c)) return; // M5: skip Out players
                        applyAutoX(card, c, cellChangesBefore);
                    });
                } else {
                    // ✗ players who passed between asker and shower (skip Out players)
                    const askerIdx = turnOrder.indexOf(askerCol);
                    if (askerIdx === -1) return;
                    let i = (askerIdx + 1) % n;
                    let steps = 0;
                    while (turnOrder[i] !== showerCol && steps < n) {
                        if (!mutedPlayers.has(turnOrder[i])) {
                            applyAutoX(card, turnOrder[i], cellChangesBefore);
                        }
                        i = (i + 1) % n;
                        steps++;
                    }
                }
            });
        }
    }

    // Build log entry — finalize the live entry
    if (hasData) {
        gameLog.push({
            turn: turnCount, playerIdx: askerCol, player: askerName, isMe,
            asked: askedCards, showerName,
            shownMe:  pendingShownMe.map(p => ({ card: p.card, player: p.player })),
            iShowed:  pendingIShowed.map(p => ({ card: p.card, toPlayer: p.toPlayer })),
        });
    }
    liveLogEntry = null; // clear live entry
    renderFullLog();

    // Update solution flags
    updateSolutionFlags([...askedCards, ...pendingShownMe.map(p=>p.card), ...pendingIShowed.map(p=>p.card)]);

    // Push undo snapshot — replace partial one if commitAsked already pushed one
    if (undoStack.length > 0 && undoStack[undoStack.length - 1].partial) {
        undoStack.pop(); // remove the partial snapshot
    }
    pushUndo({ turnStep: snapTurnStep, turnCount: snapTurnCount, cellChanges: cellChangesBefore, solutionCards: snapSolutionCards });

    clearPending();
    turnStep = (turnStep + 1) % turnOrder.length;
    // M5: skip past any players who are Out
    let advanceSafety = 0;
    while (mutedPlayers.has(turnOrder[turnStep % turnOrder.length]) && advanceSafety < turnOrder.length) {
        turnStep = (turnStep + 1) % turnOrder.length;
        advanceSafety++;
    }
    turnCount++;
    applyActiveTurnStyling(); applyPlayLocks();
    updateStage(); updateUndoButton();
    renderInfoBar();
    autoSave();
}

function renderInfoBar() {
    const nameEl  = document.getElementById('ibPlayerName');
    const badgeEl = document.getElementById('ibTurnBadge');
    const body    = document.getElementById('infoBarBody');

    // Info Bar retired — its elements no longer exist in the DOM. Bail out early.
    if (!nameEl || !badgeEl || !body) return;

    if (gamePhase === 'setup') {
        nameEl.textContent  = '⚙ Setup';
        badgeEl.textContent = '';
        const stageEl = document.getElementById('ibStage');
        if (stageEl) { stageEl.className = 'ib-stage'; stageEl.textContent = '—'; }
        body.innerHTML = '<div class="info-empty">Enter names, mark your cards, then Start Game.</div>';
        return;
    }

    const currentCol = getCurrentCol();
    const isMe       = (currentCol === meCol);
    const name       = getCurrentPlayerName();
    const isGuessing = pendingAsked.length > 0;
    const isWaiting  = committedAsked.length > 0 && pendingShowed.length === 0;

    if (isMe && (isGuessing || isWaiting)) {
        nameEl.textContent = 'I';
    } else {
        nameEl.textContent = isMe ? '🔍 My Turn' : '▶ ' + name;
    }
    badgeEl.textContent = 'Turn ' + turnCount;
    body.innerHTML = '';

    // Pending chips
    const pendingAskChips = [
        ...pendingAsked.map(p   => ({ label: 'A: '  + p.card, type: 'ask' })),
        ...committedAsked.map(p => ({ label: '✓A: ' + p.card, type: 'ask' })),
    ];
    const pendingShowChips = pendingShowed.length > 0 ? [
        { label: getColName(pendingShowed[0].col) + ' showed one of these:', type: 'show-header' },
        ...pendingShowed.map(p => ({ label: p.card, type: 'show' })),
    ] : [];
    const pendingOtherChips = [
        ...pendingShownMe.map(p => ({ label: '✓: ' + p.card + ' by ' + p.player,   type: 'shownme' })),
        ...pendingIShowed.map(p => ({ label: '→: ' + p.card + ' to ' + p.toPlayer, type: 'shownme' })),
    ];
    const allP = [...pendingAskChips, ...pendingShowChips, ...pendingOtherChips];

    if (allP.length > 0) {
        const pa   = document.createElement('div'); pa.className = 'pending-area';
        const lbl  = document.createElement('div'); lbl.className = 'pa-label'; lbl.textContent = 'Pending this turn:';
        const chips= document.createElement('div'); chips.className = 'pending-chips';
        pa.appendChild(lbl);
        allP.forEach(p => {
            const c = document.createElement('span');
            if (p.type === 'show-header') {
                c.className = 'pchip-show-header';
                c.textContent = p.label;
            } else {
                c.className = 'pchip pchip-' + p.type;
                c.textContent = p.label;
            }
            chips.appendChild(c);
        });
        pa.appendChild(chips); body.appendChild(pa);
    }

    // Filter log entries for this player
    const myEntries = gameLog.filter(e => e.playerIdx === currentCol);

    if (isMe) {
        // ── MY TURN ──
        const allShownMe = gameLog.filter(e => e.shownMe && e.shownMe.length > 0);
        if (allShownMe.length > 0) {
            addLabel(body, 'Was shown:');
            allShownMe.forEach(e => e.shownMe.forEach(s => {
                const div = document.createElement('div'); div.className = 'info-turn-entry';
                div.innerHTML = `<span class="ite-turn">Turn ${e.turn}:</span> <span class="ite-showed">${s.card}</span> by <span class="ite-showed">${s.player}</span>`;
                body.appendChild(div);
            }));
        }

        const allIShowed = gameLog.filter(e => e.iShowed && e.iShowed.length > 0);
        if (allIShowed.length > 0) {
            addLabel(body, 'I showed:');
            allIShowed.forEach(e => e.iShowed.forEach(s => {
                const div = document.createElement('div'); div.className = 'info-turn-entry';
                div.innerHTML = `<span class="ite-turn">Turn ${e.turn}:</span> <span class="ite-cards">${s.card}</span> <span class="ite-meshowed">→ to ${s.toPlayer}</span>`;
                body.appendChild(div);
            }));
        }

        if (allShownMe.length === 0 && allIShowed.length === 0) {
            addEmpty(body, 'No cards shown yet.');
        }

    } else {
        // ── OTHER PLAYER ──
        addLabel(body, 'I showed this player:');
        const iShowedThem = gameLog.filter(e => e.iShowed && e.iShowed.some(s => s.toPlayer === name));
        if (iShowedThem.length === 0) { addEmpty(body, 'Nothing shown yet.'); }
        else {
            iShowedThem.forEach(e => e.iShowed.filter(s => s.toPlayer === name).forEach(s => {
                const div = document.createElement('div'); div.className = 'info-turn-entry';
                div.innerHTML = `<span class="ite-turn">Turn ${e.turn}:</span> <span class="ite-cards">${s.card}</span>`;
                body.appendChild(div);
            }));
        }
    }
}

function addLabel(parent, text) {
    const el = document.createElement('div'); el.className = 'info-section-label'; el.textContent = text; parent.appendChild(el);
}
function addEmpty(parent, text) {
    const el = document.createElement('div'); el.className = 'info-empty'; el.textContent = text; parent.appendChild(el);
}

// Helper: get player color class by column index
function playerColorClass(playerIdx) {
    const idx = turnOrder.indexOf(playerIdx);
    return 'pc' + (idx >= 0 ? idx % 6 : 0);
}

function renderFullLog() {
    const list = document.getElementById('logList');

    const displayEntries = liveLogEntry
        ? [liveLogEntry, ...[...gameLog].reverse()]
        : [...gameLog].reverse();

    if (displayEntries.length === 0) {
        list.innerHTML = '<div style="color:var(--text-muted);font-style:italic;font-size:0.95rem;padding:6px;">No turns yet...</div>';
        return;
    }
    list.innerHTML = '';
    displayEntries.forEach(e => {
        const div = document.createElement('div');
        div.className = 'log-entry' + (e.live ? ' log-live' : '');
        const pc = playerColorClass(e.playerIdx);
        const who = e.isMe ? 'Me' : e.player;
        const tLabel = e.live ? 'Now' : 'T' + e.turn;

        let html = `<span class="log-turn">${tLabel}</span> <span class="log-who ${pc}">${who}</span>`;

        // Asked line
        if (e.asked && e.asked.length > 0) {
            html += ` <span class="log-arrow">—</span> <span class="log-asked">${e.asked.join(' · ')}</span>`;

            // Shower on same line — three cases:
            //   (a) Other-shows-other: showerName set, no card visible.
            //         → "Carol showed"
            //   (b) Me showed someone (iShowed): label is "Me", append the card.
            //         → "Me showed Dagger"
            //   (c) Someone showed Me (shownMe): label is the player, append "Me <card>".
            //         → "Bob showed Me Dagger"
            // The per-card breakdown rows below the asked line are intentionally
            // dropped — all the info now lives inline on one row.
            if (e.showerName) {
                const showerCol = turnOrder.find(c => getColName(c) === e.showerName) ?? -1;
                const spc = showerCol >= 0 ? playerColorClass(showerCol) : pc;
                html += ` <span class="log-arrow">→</span> <span class="log-shower ${spc}">${e.showerName} showed</span>`;
            } else if (e.iShowed && e.iShowed.length > 0) {
                const card = e.iShowed[0].card;
                html += ` <span class="log-arrow">→</span> <span class="log-shower pc2">Me showed</span> <span class="log-ishowed">${card}</span>`;
            } else if (e.shownMe && e.shownMe.length > 0) {
                const s = e.shownMe[0];
                const showerCol = turnOrder.find(c => getColName(c) === s.player) ?? -1;
                const spc = showerCol >= 0 ? playerColorClass(showerCol) : pc;
                html += ` <span class="log-arrow">→</span> <span class="log-shower ${spc}">${s.player} showed Me</span> <span class="log-showed-card">${s.card}</span>`;
            } else if (e.live) {
                html += ` <span class="log-arrow">→</span> <span class="log-nobody">waiting...</span>`;
            } else {
                html += ` <span class="log-arrow">→</span> <span class="log-nobody">nobody</span>`;
            }
        }

        div.innerHTML = html;
        list.appendChild(div);
    });
}

function setCell(card, col, props) {
    Object.assign(cellState[card][col], props);
    renderCell(card, col);
    if (props.check) autoXRestOfRow(card, col);
    autoSave();
}
function clearCell(card, col) {
    cellState[card][col] = { check:false, cross:false, asked:false, showed:false, shownToMe:false, meShowedTo:'', iShowedMe:false };
    renderCell(card,col); autoSave();
}

function getHeaderNames() { const n=[]; for(let i=1;i<=6;i++){ const el=document.getElementById('p'+i+'h'); n.push(el?el.value:''); } return n; }
function applyHeaderNames(n) { n.forEach((v,i)=>{ const el=document.getElementById('p'+(i+1)+'h'); if(el) el.value=v; }); }

function getSnapshot() {
    return { cellState, gameLog, turnOrder, turnStep, turnCount, meCol, gamePhase,
             headerNames: getHeaderNames(), notes: document.getElementById('notesArea').value,
             solutionCards: [...solutionCards],
             // M2 fixed 4×30 grid + active/muted state
             categories: CATEGORIES.map(c => ({ name:c.name, cards:[...c.cards] })),
             mutedCategoryIdxs: [...mutedCategoryIdxs],
             mutedCards: [...mutedCards],
             // M4: card counts + player-out state + cell notes + summary marks
             cardCounts: [...cardCounts],
             mutedPlayers: [...mutedPlayers],
             cellNotes: { ...cellNotes },
             summaryMarks: { ...summaryMarks },
             setupStep,
             schemaVersion: 5 };
}

function applySnapshot(d) {
    // Restore categories. We always end up with exactly 4 categories totaling 30 cards.
    if (Array.isArray(d.categories) && d.categories.length) {
        CATEGORIES = d.categories.map(c => ({ name:c.name || 'Category', cards:[...(c.cards || [])] }));
    } else if (d.suspects || d.weapons || d.rooms || d.motives) {
        // Legacy save: stitch the old fixed arrays into the new shape
        CATEGORIES = [];
        if (d.suspects && d.suspects.length) CATEGORIES.push({ name:'Suspects', cards:[...d.suspects] });
        if (d.weapons  && d.weapons.length)  CATEGORIES.push({ name:'Weapons',  cards:[...d.weapons]  });
        if (d.rooms    && d.rooms.length)    CATEGORIES.push({ name:'Rooms',    cards:[...d.rooms]    });
        if (d.motives  && d.motives.length)  CATEGORIES.push({ name:'Motives',  cards:[...d.motives]  });
        if (!CATEGORIES.length) CATEGORIES = defaultCategories();
    }
    normalizeCategoryShape();
    // Restore muted state (default to none if absent)
    mutedCategoryIdxs = new Set(Array.isArray(d.mutedCategoryIdxs) ? d.mutedCategoryIdxs : []);
    mutedCards        = new Set(Array.isArray(d.mutedCards)        ? d.mutedCards        : []);
    // M4: card counts + player-out state + cell notes + summary marks
    if (Array.isArray(d.cardCounts) && d.cardCounts.length === 6) cardCounts = [...d.cardCounts];
    else cardCounts = [null,null,null,null,null,null];
    mutedPlayers = new Set(Array.isArray(d.mutedPlayers) ? d.mutedPlayers : []);
    cellNotes    = (d.cellNotes    && typeof d.cellNotes    === 'object') ? { ...d.cellNotes    } : {};
    summaryMarks = (d.summaryMarks && typeof d.summaryMarks === 'object') ? { ...d.summaryMarks } : {};
    setupStep    = (typeof d.setupStep === 'number') ? Math.max(1, Math.min(5, d.setupStep)) : 1;
    // Reflect card counts into the inputs
    for (let col = 0; col < 6; col++) {
        const ce = document.getElementById('p'+(col+1)+'c');
        if (ce) ce.value = (cardCounts[col] == null) ? '' : String(cardCounts[col]);
    }
    refreshCardCountDisplays();
    rebuildAllCards();
    buildTable(); // rebuild with restored names

    cellState    = d.cellState    || {};
    // Backfill the M5+ marks list for any legacy save that lacks it
    Object.keys(cellState).forEach(card => {
        const colMap = cellState[card]; if (!colMap) return;
        Object.keys(colMap).forEach(colKey => {
            const cs = colMap[colKey];
            if (!cs) return;
            if (!Array.isArray(cs.marks)) cs.marks = [];
            if (cs.marks.length === 0) {
                // Reconstruct from booleans, with turn 0 as a "no record" placeholder
                if (cs.check)      cs.marks.push({ type:'check',      turn:0 });
                if (cs.cross)      cs.marks.push({ type:'cross',      turn:0 });
                if (cs.asked)      cs.marks.push({ type:'asked',      turn:0 });
                if (cs.showed)     cs.marks.push({ type:'showed',     turn:0 });
                if (cs.shownToMe)  cs.marks.push({ type:'shownToMe',  turn:0 });
                if (cs.iShowedMe)  cs.marks.push({ type:'iShowedMe',  turn:0 });
                if (cs.meShowedTo) cs.marks.push({ type:'meShowedTo', turn:0, to:cs.meShowedTo });
            }
        });
    });
    gameLog      = d.gameLog      || [];
    turnOrder    = d.turnOrder && d.turnOrder.length > 0 ? d.turnOrder : buildTurnOrder();
    turnStep     = d.turnStep     || 0;
    turnCount    = d.turnCount    || 1;
    meCol        = d.meCol        !== undefined ? d.meCol : -1;
    gamePhase    = d.gamePhase    || 'setup';
    solutionCards= new Set(d.solutionCards || []);
    document.getElementById('notesArea').value = d.notes || '';
    applyHeaderNames(d.headerNames || []);
    undoStack = []; typingUndoStack = [];

    if (gamePhase === 'play') {
        for(let i=1;i<=6;i++){
            const el = document.getElementById('p'+i+'h'); if(el) el.disabled=true;
            const ec = document.getElementById('p'+i+'c'); if(ec) ec.disabled=true;
        }
        for(let c=0;c<6;c++){ const th=document.getElementById('th'+c); if(th) th.classList.add('in-play'); }
        document.getElementById('setupBanner').classList.add('game-on');
    } else {
        for(let i=1;i<=6;i++){
            const el = document.getElementById('p'+i+'h'); if(el) el.disabled=false;
            const ec = document.getElementById('p'+i+'c'); if(ec) ec.disabled=false;
        }
        for(let c=0;c<6;c++){ const th=document.getElementById('th'+c); if(th) th.classList.remove('in-play'); }
        document.getElementById('setupBanner').classList.remove('game-on');
    }
    updateButtonStates();
    applyPlayerOutBadges();
    updateDeckBarVisibility();
    applyMeColStyling(); applyInactiveColStyling(); applyBlankColLock();
    applyActiveTurnStyling(); applyPlayLocks();
    updateCardLabels();
    updateCategoryBanners();
    renderAllCells(); renderFullLog(); renderSolutionFlags(); renderInfoBar(); updateUndoButton();
}

// Manual Save / Load buttons retired — autoSave runs on every state change,
// so explicit checkpointing was redundant. The auto-restore on page load
// (in the window 'load' handler) handles bringing the game back.

function autoSave() {
    localStorage.setItem('clueTrackerV6', JSON.stringify(getSnapshot()));
}
function newGame() {
    // M5+: ask whether to keep the same players or start with fresh names.
    // Two two-tap buttons; right-to-left layout puts "Same Players" on the right as the primary.
    showModal({
        title: 'Start a new game?',
        bodyHTML: 'Keep the current player names and card counts, or start with everything blank?',
        buttons: [
            { label: 'Cancel', action: () => hideModal() },
            { label: 'New Players',  danger: true, confirmTwoTap: true,
              action: () => { hideModal(); _doNewGame({ keepPlayers: false }); } },
            { label: 'Same Players', primary: true, confirmTwoTap: true,
              action: () => { hideModal(); _doNewGame({ keepPlayers: true  }); } }
        ]
    });
}
function _doNewGame(opts) {
    opts = opts || {};
    const keepPlayers = !!opts.keepPlayers;
    // Snapshot player names + card counts if we're keeping them
    let keptNames = null, keptCounts = null;
    if (keepPlayers) {
        keptNames  = getHeaderNames();
        keptCounts = [...cardCounts];
    }
    localStorage.removeItem('clueTrackerV6');
    CATEGORIES = defaultCategories();
    mutedCategoryIdxs = new Set([3]);
    mutedCards        = new Set(['Card 28','Card 29','Card 30']);
    rebuildAllCards();
    initState();
    gameLog=[]; turnOrder=[]; turnStep=0; turnCount=1; meCol=-1; gamePhase='setup';
    undoStack=[]; typingUndoStack=[]; solutionCards=new Set();
    setupStep = 1;
    document.getElementById('setupBanner').classList.remove('game-on');
    // Phase text now driven by updatePhaseBarText()
    if (keepPlayers && keptNames) {
        applyHeaderNames(keptNames);
        // restore Me col indicator
        meCol = findMeCol();
        cardCounts = keptCounts;
    } else {
        for(let i=1;i<=6;i++){ const el=document.getElementById('p'+i+'h'); if(el){ el.value=''; } }
        cardCounts = [null,null,null,null,null,null];
        meCol = -1;
    }
    for(let i=1;i<=6;i++){ const el=document.getElementById('p'+i+'h'); if(el) el.disabled=false; }
    for(let i=1;i<=6;i++){
        const elC=document.getElementById('p'+i+'c');
        if(elC){ elC.value = (cardCounts[i-1] == null) ? '' : String(cardCounts[i-1]); elC.disabled=false; }
    }
    mutedPlayers = new Set();
    cellNotes = {};
    summaryMarks = {};
    refreshCardCountDisplays();
    for(let c=0;c<6;c++){ const th=document.getElementById('th'+c); if(th){ th.classList.remove('me-col'); th.classList.remove('in-play'); th.classList.remove('player-out'); } }
    if (meCol >= 0) applyMeColStyling();
    clearPending();
    document.getElementById('notesArea').value='';
    buildTable(); updateCardLabels(); updateCategoryBanners();
    updateDeckBarVisibility();
    renderAllCells(); renderFullLog(); renderSolutionFlags(); renderInfoBar(); updateUndoButton();
    showStatus(keepPlayers ? 'New game — same players.' : 'New game — fresh players.', 'var(--green-lt)');
}

function showStatus(msg, color) {
    // Game-related status messages — appear in the Phase Bar's left side.
    // No color passed → clear inline so CSS variable (var(--green-lt)) takes over.
    const el = document.getElementById('statusMsg');
    if (!el) return;
    el.textContent = msg; el.style.color = color || '';
    setTimeout(() => el.textContent = '', 5000);
}
// M5+: Deck-related status messages — appear in the Game Deck bar's right side.
function showDeckStatus(msg, color) {
    const el = document.getElementById('deckStatusMsg');
    if (!el) { showStatus(msg, color); return; }
    el.textContent = msg; el.style.color = color || '';
    setTimeout(() => el.textContent = '', 5000);
}

// M5+: Dynamic Phase Bar text — separate prefix + directive
// Per-turn directive ("Eve is guessing" / "Eve is waiting" / "Bob showed") lives in the
// page header (#headerDirective) at 1.2rem. Phase Bar carries turn info, wizard steps,
// "click Next →", "{name}'s turn", and status messages.
function updatePhaseBarText() {
    const pre   = document.getElementById('phasePrefix');
    const dir   = document.getElementById('phaseDirective');
    const hdr   = document.getElementById('headerDirective');
    const dkDir = document.getElementById('deckBarDirective');
    if (!pre || !dir) return;

    if (gamePhase === 'setup') {
        pre.textContent = '⚙️ Setup';
        if (hdr)   hdr.textContent   = '';
        if (dkDir) dkDir.textContent = '';
        if (setupStep <= 1) {
            dir.textContent = '— Step 1: Right-click category banners and card names to shape the grid for your game (move, mute). When the grid matches your game, tap Next →.';
        } else if (setupStep === 2) {
            dir.textContent = '— Step 2: Enter player names, Tab to card count, Tab to next player. (Type "Me" in your own seat.) When all players are seated, tap Next →.';
        } else if (setupStep === 3) {
            dir.textContent = '— Step 3: Change the name of any Category. Tab to go to the next category. Tap Next when finished.';
        } else if (setupStep === 4) {
            dir.textContent = '— Step 4: Change the name of any Card. Tab to go to the next card. Tap Next when finished.';
        } else {
            dir.textContent = '— Step 5: Check off the cards you hold in your "Me" column. When done, press ▶ Start Game.';
        }
    } else {
        // Play — prefix carries the turn number; Phase Bar directive carries whose turn it is
        // for the entire turn. Deck Bar (in play mode) carries the dynamic state
        // (thinking / guessing / waiting / showed). Header directive is cleared in play.
        pre.textContent = `🎮 Game · Turn ${turnCount}`;
        if (hdr) hdr.textContent = '';
        const cur = getCurrentCol();
        const isMe = (cur === meCol);
        const name = isMe ? 'You' : getCurrentPlayerName();
        const turnLabel = isMe ? `— Your turn` : `— ${name}'s turn`;
        const hasShowed = pendingShowed.length > 0
                        || pendingShownMe.some(p => p.committed)
                        || pendingIShowed.some(p => p.committed);
        let directiveText;
        if (hasShowed) {
            // Cards have been shown — next action is to advance the turn.
            const showerName = pendingShowed.length > 0 ? getColName(pendingShowed[0].col)
                             : (pendingIShowed.length > 0 ? 'You' : (pendingShownMe[0] && pendingShownMe[0].player) || name);
            directiveText = `${showerName} showed`;
            dir.textContent = `— Tap Next to continue.`;
        } else if (committedAsked.length > 0) {
            // 3 cards committed — next action is to tap the shower column header
            // (or Next if nobody showed).
            directiveText = isMe ? `You are waiting` : `${name} is waiting`;
            dir.textContent = `— Tap the column header of the player who showed, or Next if nobody.`;
        } else {
            // 0–2 cards picked so far — still selecting the guess.
            directiveText = isMe ? `You are guessing` : `${name} is guessing`;
            dir.textContent = `${turnLabel} - Tap the 3 cards guessed`;
        }
        if (dkDir) dkDir.textContent = directiveText;
    }
}

// M5+: Set tabIndex on inputs based on the current setup step.
// Step 1 → right-click work only, no typed inputs.
// Step 2 → player + count inputs tabbable. Step 3 → category names only.
// Step 4 → card names only. Step 5 → click cells, no Tab. In play, everything default.
function updateTabIndexes() {
    const setAll = (sel, idx) => document.querySelectorAll(sel).forEach(el => el.tabIndex = idx);
    // All focusable element types — used to blanket-block during setup so Tab
    // can't wander into buttons (Guide, Rules, Dark, Next, deck slots, ...),
    // Notes/Rules textareas, or browser chrome.
    const focusable = 'button, input, textarea, select, a[href]';

    if (gamePhase === 'setup') {
        // Block everything first…
        setAll(focusable, -1);
        // …then re-enable ONLY the inputs the current step asks the user to fill.
        if (setupStep === 2)      setAll('input.ph, input.cc', 0);
        else if (setupStep === 3) setAll('input.cat-name-input', 0);
        else if (setupStep === 4) setAll('input.card-name-input', 0);
        // Steps 1 and 5: nothing to type — all focusables stay at -1.
    } else {
        // Play phase — restore browser-default Tab order.
        setAll(focusable, 0);
    }
}

// Enable / disable the always-visible action buttons based on state.
function updateButtonStates() {
    const btnUndo       = document.getElementById('btnUndo');
    const btnUndoTyping = document.getElementById('btnUndoTyping');
    const btnNext       = document.getElementById('btnNextPlayer');
    const btnStart      = document.getElementById('btnStartGame');
    const inPlay        = (gamePhase === 'play');
    if (btnUndo) {
        // Setup: Undo = anti-Next, enabled when there's a prior step to return to.
        const setupCan = (gamePhase === 'setup') && setupStep > 1;
        const playCan  = inPlay && (pendingAsked.length > 0 || committedAsked.length > 0
                                   || pendingShowed.length > 0 || pendingShownMe.length > 0
                                   || pendingIShowed.length > 0 || hasMarksForTurn(turnCount)
                                   || turnCount > 1);
        btnUndo.disabled = !(setupCan || playCan);
    }
    if (btnUndoTyping) {
        // Visible only in setup steps 2/3/4 (steps where typing happens).
        const typingStepNow = (gamePhase === 'setup') && (setupStep >= 2 && setupStep <= 4);
        btnUndoTyping.style.display = typingStepNow ? '' : 'none';
        btnUndoTyping.disabled = !typingStepNow || (typingUndoStack.length === 0);
    }
    if (btnNext) {
        // Active in play; in setup, active until we reach Step 5 (where Start Game takes over)
        btnNext.disabled = inPlay ? false : (setupStep >= 5);
    }
    updateTabIndexes();
    if (btnStart) {
        // Only on Step 5, with Me set and at least one card checked (or even none — let it start).
        if (inPlay) {
            btnStart.disabled = true;
        } else {
            const me = findMeCol();
            btnStart.disabled = (setupStep < 5) || (me < 0);
        }
    }
}

// M6: User's Guide content — conversational, written for someone who hasn't
// used the app before. Lives as an HTML string and is injected on load so

function setGuideContent() {

        <h3>What this app is for</h3>

        <p>As the game unfolds, you record who asked about which cards, who showed, and who passed. The app keeps that history tidy and out of your head, so you can focus on the deductions.</p>
        <p>One thing it does <em>not</em> do is figure out the answer for you. It records observations; the conclusions are still yours to draw. That's the design.</p>
        <p>This app is designed to be used with a variety of game that incorporate up to 4 categories of who, what, where, why, and up to 30 cards for possibilities in deducing the correct answers.</p>

        <h3>Setting up a new game</h3>
        <p>You walk through five short steps. The Phase Bar at the top tells you that you are in the Setup and which step you're on.</p>
        <ul>
            <li><strong>Step 1 — Category configuration.</strong> If the default configuration of categories and cards is what you need, tap Next. Otherwise, assemble the categories and cards for the specific game or version you are playing. The categories can be moved up and down, and each card can be moved up and down. Right-click the box of a category to move it up or down to a row so that the above category has the correct number of cards under it, and then this category below that. Repeat this for the remainder of the configuration. If there are unused categories and/or cards, right-click their names and mute that row, leaving it at the bottom of the grid. When finished, tap Next.</li>
            <li><strong>Step 2 — Players.</strong> Type each player's name in the column headers along with how many cards they hold in the (?) box next to each name. Put your own name as Me in your seat. Tab moves you across the row from name, to number, to next name. You tap Next when you are finished filling in player names.</li>
            <li><strong>Step 3 — Categories.</strong> The game deck cards can will be in up to four Categories. If you are playing a game like the original Clue, there are 3 categories, Suspects / Weapons / Rooms, you enter those names here. You tap Next when you are finished filling in category names.</li>
            <li><strong>Step 4 — Cards.</strong> Same idea for card names. The defaults are generic placeholders; replace them with your game's actual card names.</li>

            <li><strong>Undo —</strong> If at any point you want to go back a step or more, tap Undo.</li>
            <li><strong>Start Game —</strong> After finishing the setup, tap Start Game and the app goes to the Game page.</li>
        </ul>

        <h3>Right-click menus</h3>
        <p>A right-click brings up a small menu depending on what you click:</p>
        <ul>
            <li><strong>Card name</strong> — toggle that card active or muted (muted rows are dimmed and ignored).</li>
            <li><strong>Category banner</strong> — rename the category, move the banner up or down by one row, or toggle the whole category active/muted.</li>
            <li><strong>Player header</strong> (during play) — mark that player out of the game.</li>
            <li><strong>Any player cell</strong> — add a six-character note that lives in the corner of the cell.</li>
        </ul>

        <h3>Game Play</h3>
        <p>The Game page opens where the app has automatically filled in the boxes in the grid of your column, the Me column, with √s for the cards you hold and ✗s for the cards you don't. Likewise, the app has automatically filled the boxes in the other player columns with ✗s for the cards you hold.</p>
        <p>The first player's column is highlighted and ready for the first turn.</p>

        <h3>Turn play</h3>
        <p>Each turn follows the same shape. The page header on the left shows where the turn is at — <em>thinking</em>, <em>guessing</em>, <em>waiting</em>, <em>showed</em> — so you can glance up and orient yourself.</p>
        <ul>
            <li><strong>Click the asked cards.</strong> When a player asks about three cards, click those three cards in the asking player's column. A ? mark with a turn<sup>#</sup> tag drops in.</li>
            <li><strong>Click the shower's column header.</strong> When someone shows, click their player-header. The app records the shown cards with a ! mark on each of the three cards in their column and drops a ✗ on the card for every player that passed in between — those players couldn't show, so they don't hold any of the three cards.</li>
            <li><strong>When it's your turn to ask or to be shown,</strong> a small popup appears so you can record which card was involved. Marks like ✓ (you saw it) and ←Me / ←Player (who showed to whom) capture the private exchange.</li>
            <li><strong>Press Next.</strong> At the end of the current player's turn tap Next. The turn advances and a new entry lands in the Game Log on the right.</li>
            <li><strong>Undo —</strong> If at any point you want to go back to the beginning of the current turn or the previous turn, tap Undo. Every mark that was entered during that turn will be erased.</li>
        </ul>

        <h3>Reading the marks</h3>
        <p>Every mark carries a small turn tag <sup>#</sup> — the superscript number tells you on what turn number it was placed. (e.g. ✗<sup>1</sup>)</p>
        <ul>
            <li><strong>✓</strong> — this player has this card. Confirmed.</li>
            <li><strong>✗</strong> — this player does <em>not</em> have this card. Confirmed.</li>
            <li><strong>?</strong> — this player asked about this card on that turn.</li>
            <li><strong>!</strong> — this player showed a card on that turn (which one is private to the asker).</li>
            <li><strong>✓*</strong> — this player showed <em>you</em> this card on that turn.</li>
            <li><strong>←Me</strong> — you showed this card to this player on that turn.</li>
            <li><strong>←Player</strong> — that named player showed this card to you on that turn (sits on the Me column).</li>
        </ul>
        <p>Once a card carries ✓ or ✗ the app stops adding new ! marks there — the cell's state is already settled, and the ! would just be noise. The ? mark still stacks; it's useful to see who's been chasing that card.</p>

        <h3>The Summary column</h3>
        <p>The narrow ∑ column between the card name and the player columns is yours to mark by hand. Clicking the cell cycles it: blank → red ✕ → green dot → blank. Use ✕ to rule a card out of the solution; use the green dot to flag a card you think <em>is</em> in the solution. The app never writes to this column on its own — it's a scratchpad for your guesses.</p>

        <h3>Game Decks</h3>
        <p>A Game Deck is the set of category and card names for a particular variant — say, classic Clue, Master Detective, or your own house mix. You can save up to six decks. Saving a deck stores only the names and where the category banners sit; loading a deck swaps the names back in without touching your in-progress marks, notes, or turn counter.</p>
        <p>Each deck slot has its own Rules text area (under the 📋 Rules button in the header). Paste the rules sheet for that variant once, and they'll be there next time you load that deck.</p>

        <h3>If something feels stuck</h3>
        <p>The Phase Bar shows a status message when a click was rejected — "Asker can't be the shower", "Bob already has ✗ on all three", that sort of thing. The app stops you from recording something inconsistent, but it never decides things for you. If a guard blocks you and you disagree, check the cells in question; usually the guard is right, but the underlying state is wrong, and the fix is to Undo and re-record.</p>
        <p>Have fun. The whole point is to play the game and let the page do the bookkeeping.</p>
    `;

// M4: MODAL DIALOG SYSTEM (replaces native prompt/confirm)
// ═══════════════════════════════════════════════════════════════════
function showModal(opts) {
    const overlay = document.getElementById('modalOverlay');
    document.getElementById('modalTitle').textContent = opts.title || '';
    const bodyEl = document.getElementById('modalBody');
    bodyEl.innerHTML = '';
    if (opts.body)        bodyEl.appendChild(opts.body);
    else if (opts.bodyHTML) bodyEl.innerHTML = opts.bodyHTML;
    const actions = document.getElementById('modalActions');
    actions.innerHTML = '';
    (opts.buttons || []).forEach(b => {
        const btn = document.createElement('button');
        let cls = 'btn ';
        if (b.primary)      cls += 'btn-gold';
        else if (b.danger)  cls += 'btn-red';
        else                cls += 'btn-ghost';
        btn.className = cls;
        btn.textContent = b.label;
        if (b.confirmTwoTap) {
            let armed = false;
            let armTimeout = null;
            const originalLabel = btn.textContent;
            const originalClass = btn.className;
            btn.onclick = () => {
                if (armed) {
                    clearTimeout(armTimeout);
                    if (b.action) b.action();
                    else hideModal();
                    return;
                }
                armed = true;
                btn.textContent = b.confirmLabel || 'Sure ?';
                btn.className = originalClass + ' btn-confirm-armed';
                armTimeout = setTimeout(() => {
                    armed = false;
                    btn.textContent = originalLabel;
                    btn.className = originalClass;
                }, 4000);
            };
        } else {
            btn.onclick = () => {
                if (b.action) b.action();
                else hideModal();
            };
        }
        actions.appendChild(btn);
    });
    overlay.classList.add('open');
    // Default: focus the first input if any
    setTimeout(() => {
        const first = bodyEl.querySelector('input,textarea,select,button');
        if (first) { first.focus(); if (first.select) first.select(); }
    }, 50);
}

function hideModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}

function onModalOverlayClick(e) {
    // Click on backdrop (not the inner window) closes the modal
    if (e.target.id === 'modalOverlay') hideModal();
}

// Replacement for prompt() — onSubmit receives the entered string, or null on cancel.
// Optional opts.validate(value) returns an error string (modal stays open with inline
// message + input re-focused) or a falsy value (modal closes, onSubmit fires).
function modalPrompt(opts) {
    const wrapper = document.createElement('div');
    if (opts.message) {
        const p = document.createElement('div'); p.style.marginBottom = '10px'; p.textContent = opts.message;
        wrapper.appendChild(p);
    }
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'modal-input';
    input.value = opts.defaultValue || '';
    input.maxLength = opts.maxLength || 32;
    if (opts.placeholder) input.placeholder = opts.placeholder;
    wrapper.appendChild(input);
    const errorEl = document.createElement('div');
    errorEl.className = 'modal-error';
    errorEl.style.cssText = 'color:var(--red-lt); margin-top:8px; min-height:1.2em; font-size:0.9rem;';
    wrapper.appendChild(errorEl);
    const tryCommit = () => {
        const val = input.value.trim();
        if (opts.validate) {
            const err = opts.validate(val);
            if (err) {
                errorEl.textContent = err;
                input.focus(); input.select();
                return;
            }
        }
        errorEl.textContent = '';
        hideModal();
        opts.onSubmit && opts.onSubmit(val);
    };
    showModal({
        title: opts.title || 'Enter a value',
        body: wrapper,
        buttons: [
            { label: 'Cancel', action: () => { hideModal(); opts.onSubmit && opts.onSubmit(null); } },
            { label: opts.okLabel || 'Save', primary: true, confirmTwoTap: !!opts.confirmTwoTap, action: tryCommit }
        ]
    });
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !opts.confirmTwoTap) tryCommit();
    });
    // Clear the inline error as soon as the user starts editing.
    input.addEventListener('input', () => { errorEl.textContent = ''; });
}

// Replacement for confirm() — onConfirm called on OK, onCancel optional
function modalConfirm(opts) {
    showModal({
        title: opts.title || 'Confirm',
        bodyHTML: opts.message || '',
        buttons: [
            { label: opts.cancelLabel || 'Cancel', action: () => { hideModal(); opts.onCancel && opts.onCancel(); } },
            { label: opts.okLabel || 'OK', primary: !opts.danger, danger: !!opts.danger, confirmTwoTap: !!opts.confirmTwoTap, action: () => {
                hideModal(); opts.onConfirm && opts.onConfirm();
            } }
        ]
    });
}

// ═══════════════════════════════════════════════════════════════════
// TYPING UNDO — step-scoped, reverses the last text/numeric edit
// in setup Steps 2, 3, 4. Cleared whenever setupStep changes.
// ═══════════════════════════════════════════════════════════════════
function pushTypingUndo(entry) {
    typingUndoStack.push(entry);
    updateButtonStates();
}
function clearTypingUndo() {
    typingUndoStack = [];
    updateButtonStates();
}
function undoTyping() {
    if (gamePhase !== 'setup' || typingUndoStack.length === 0) return;
    const entry = typingUndoStack.pop();
    applyTypingUndo(entry);
    updateButtonStates();
    autoSave();
}
function applyTypingUndo(entry) {
    switch (entry.type) {
        case 'player-name': {
            const inp = document.getElementById('p' + (entry.col + 1) + 'h');
            if (inp) {
                inp.value = entry.oldValue;
                inp._oldTypingValue = undefined;
                onNameChange();
            }
            break;
        }
        case 'card-count': {
            const inp = document.getElementById('p' + (entry.col + 1) + 'c');
            if (inp) {
                inp.value = entry.oldValue;
                inp._oldTypingValue = undefined;
                onCardCountChange(entry.col);
            }
            break;
        }
        case 'cat-name': {
            if (CATEGORIES[entry.catIdx]) {
                CATEGORIES[entry.catIdx].name = entry.oldValue;
                buildTable();
                renderAllCells();
                renderInfoBar();
            }
            break;
        }
        case 'card-name': {
            const cat = CATEGORIES[entry.catIdx];
            if (cat && cat.cards[entry.cardIdx] !== undefined) {
                const currentName = cat.cards[entry.cardIdx];
                const targetName  = entry.oldValue;
                if (currentName === targetName) break;
                cat.cards[entry.cardIdx] = targetName;
                rebuildAllCards();
                if (cellState[currentName]) {
                    cellState[targetName] = cellState[currentName];
                    delete cellState[currentName];
                }
                if (mutedCards.has(currentName)) {
                    mutedCards.delete(currentName);
                    mutedCards.add(targetName);
                }
                solutionCards.delete(currentName);
                buildTable();
                renderAllCells();
                renderInfoBar();
            }
            break;
        }
    }
}
// Wires focus/blur on a typing input. On focus we capture the prior value;
// on blur, if it changed, we push a typing-undo entry built from the prior value.
function wireTypingInput(input, entryBuilder) {
    if (!input || input._typingWired) return;
    input._typingWired = true;
    input.addEventListener('focus', () => {
        if (gamePhase !== 'setup') return;
        input._oldTypingValue = input.value;
    });
    input.addEventListener('blur', () => {
        if (gamePhase !== 'setup') return;
        if (input._oldTypingValue === undefined) return;
        if (input._oldTypingValue !== input.value) {
            pushTypingUndo(entryBuilder(input._oldTypingValue));
        }
        input._oldTypingValue = undefined;
    });
}

let cellNotes = {};
function cellNoteKey(card, col) { return card + '|' + col; }

function setCellNote(card, col, text) {

    text = (text || '').slice(0, 6);
    if (text) cellNotes[k] = text; else delete cellNotes[k];
}
