    const cur = summaryMarks[card] || '';
    summaryMarks[card] = (cur === '' ? 'x' : (cur === 'x' ? 'star' : ''));
    if (!summaryMarks[card]) delete summaryMarks[card];
}

// M5+: Popup for Me-as-asker — pick which of the 3 asked cards the shower showed me.
function openMeAskerPicker(showerCol, askedCards) {
    const showerName = getColName(showerCol);
    const wrapper = document.createElement('div');
    const intro = document.createElement('div');
    intro.style.marginBottom = '12px';
    intro.innerHTML = `Which card did <strong>${showerName}</strong> show you?`;
    wrapper.appendChild(intro);
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; flex-wrap:wrap; gap:8px; justify-content:center;';
    // The shower could only have shown a card Me does NOT hold — filter them out entirely.
    // Mobile parity: removed from the picker rather than greyed.
    const showableCards = askedCards.filter(card =>
        !(cellState[card] && cellState[card][meCol] && cellState[card][meCol].check)
    );
    const cardsForPicker = showableCards.length > 0 ? showableCards : askedCards;
    cardsForPicker.forEach(card => {
        const btn = document.createElement('button');
        btn.className = 'btn btn-gold';
        btn.style.cssText = 'font-size:1rem; padding:8px 16px;';
        btn.textContent = card;
        btn.onclick = () => {
            hideModal();
            markCell(card, showerCol, 'check');
            markCell(card, showerCol, 'shownToMe');
            // ✓ in any column → ✗ in the rest of the row (skip Me; skip already-marked).
            applyAutoXOnCheck(card, showerCol);
            markCell(card, meCol, 'meShowedTo', { to: showerName });
            // M5+: ring-loop only — ✗ the players who PASSED (between asker and shower) on ALL 3 asked cards.
            const n        = turnOrder.length;
            const askerIdx = turnOrder.indexOf(meCol);
            const allAsked = askedCards;
            let i = (askerIdx + 1) % n;
            let steps = 0;
            while (turnOrder[i] !== showerCol && steps < n) {
                if (!mutedPlayers.has(turnOrder[i])) {
                    allAsked.forEach(ac => applyAutoX(ac, turnOrder[i], []));
                }
                i = (i + 1) % n;
                steps++;
            }
            // Register the show so nextPlayer doesn't run its "nobody showed" branch and re-apply auto-✗
            pendingShownMe.push({ card, col:showerCol, player:showerName, committed:true, autoXDone:true });
            // Mirror to liveLogEntry so the Log flips from "waiting..." to
            // "[shower] showed Me [card]" immediately (before Next is pressed).
            if (liveLogEntry) liveLogEntry.shownMe.push({ card, player: showerName });
            renderAllCells(); renderFullLog();
            updateModeBar(); updateStage(); updateUndoButton(); renderInfoBar();
            autoSave();
        };
        row.appendChild(btn);
    });
    wrapper.appendChild(row);
    showModal({ title:'Shown to Me', body:wrapper, buttons:[{ label:'Cancel', action:hideModal }] });
}

// M5+: Popup for Me-as-shower — pick which of the asker's 3 cards I showed.
function openMeShowerPicker(askerCol, askedCards) {
    const askerName = getColName(askerCol);
    const wrapper = document.createElement('div');
    const intro = document.createElement('div');
    intro.style.marginBottom = '12px';
    intro.innerHTML = `Which card did you show <strong>${askerName}</strong>?<br><span style="font-size:0.88rem; color:var(--text-muted); font-style:italic;">(Cards you don't hold are disabled.)</span>`;
    wrapper.appendChild(intro);
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; flex-wrap:wrap; gap:8px; justify-content:center;';
    askedCards.forEach(card => {
        const btn = document.createElement('button');
        const hasIt = cellState[card] && cellState[card][meCol] && cellState[card][meCol].check;
        btn.className = hasIt ? 'btn btn-gold' : 'btn btn-ghost';
        btn.style.cssText = 'font-size:1rem; padding:8px 16px;';
        btn.textContent = card;
        btn.disabled = !hasIt;
        btn.onclick = () => {
            hideModal();
            markCell(card, askerCol, 'iShowedMe');
            // Me's column already has check; ensure it does.
            if (!(cellState[card] && cellState[card][meCol] && cellState[card][meCol].check)) {
                markCell(card, meCol, 'check');
                // ✓ in any column → ✗ in the rest of the row (skip Me; skip already-marked).
                applyAutoXOnCheck(card, meCol);
            }
            // Ring-loop ✗ — every player who PASSED between asker and Me (the shower) didn't have
            // ANY of the 3 asked cards, so they get ✗ across all 3. Mirrors openMeAskerPicker.
            const n        = turnOrder.length;
            const askerIdx = turnOrder.indexOf(askerCol);
            const allAsked = askedCards;
            let i = (askerIdx + 1) % n;
            let steps = 0;
            while (turnOrder[i] !== meCol && steps < n) {
                if (!mutedPlayers.has(turnOrder[i])) {
                    allAsked.forEach(ac => applyAutoX(ac, turnOrder[i], []));
                }
                i = (i + 1) % n;
                steps++;
            }
            // Record the show in pendingIShowed so the Phase Bar directive and log
            // know a show has happened (otherwise it stays stuck on "is waiting for show").
            pendingIShowed.push({ card, col: askerCol, toPlayer: askerName, committed: true });
            // Mirror to liveLogEntry so the Log flips from "waiting..." to
            // "Me showed [card]" immediately (before Next is pressed).
            if (liveLogEntry) liveLogEntry.iShowed.push({ card, toPlayer: askerName });
            renderAllCells(); renderFullLog();
            updateModeBar(); updateStage(); updateUndoButton(); renderInfoBar();
            autoSave();
        };
        row.appendChild(btn);
    });
    wrapper.appendChild(row);
    showModal({ title:'You Showed', body:wrapper, buttons:[{ label:'Cancel', action:hideModal }] });
}

function openCellNoteModal(card, col) {
    const playerName = getColName(col);
    const current = getCellNote(card, col);
    modalPrompt({
        title: `Cell note: ${card} / ${playerName}`,
        message: 'Up to 6 characters. Leave blank to remove the note.',
        defaultValue: current,
        maxLength: 6,
        okLabel: 'Save',
        onSubmit: (val) => {
            if (val === null) return;
            setCellNote(card, col, val);
            renderCell(card, col);
            autoSave();
        }
    });
}

function applyPlayerOutBadges() {
    for (let col = 0; col < 6; col++) {
        const th = document.getElementById('th' + col);
        if (!th) continue;
        th.classList.toggle('player-out', mutedPlayers.has(col));
    }
}

function openPlayerOutModal(col) {
    const name = getColName(col);
    const isOut = mutedPlayers.has(col);
    const wrapper = document.createElement('div');
    // Once a player is Out they stay Out — no reactivation path. Defense in
    // depth: the right-click menu also returns early for Out players.
    if (isOut) return;
    // Marking a player OUT — also let user note which cards (if any) the player revealed on the way out
    const intro = document.createElement('div');
    intro.style.marginBottom = '10px';
    intro.innerHTML = `Mark <strong>${name}</strong> as Out.<br>If they revealed any of their cards on the way out, click the cards below to mark them.<br><span style="color:var(--text-muted);font-style:italic;font-size:0.88rem;">Their column stays visible so you can keep tracking what's known about it.</span>`;
    wrapper.appendChild(intro);

    // Card picker — list of active cards as toggle buttons
    const cardArea = document.createElement('div');
    cardArea.style.cssText = 'max-height:240px; overflow-y:auto; border:1px solid var(--border-lt); border-radius:4px; padding:8px; background:var(--bg);';
    const picked = new Set();
    const renderCardPicker = () => {
        cardArea.innerHTML = '';
        CATEGORIES.forEach((cat, ci) => {
            if (!isCategoryActive(ci)) return;
            const sectionLbl = document.createElement('div');
            sectionLbl.style.cssText = 'font-family:Playfair Display,serif; text-transform:uppercase; letter-spacing:0.1em; font-size:0.78rem; color:var(--text-muted); margin:6px 0 3px;';
            sectionLbl.textContent = cat.name;
            cardArea.appendChild(sectionLbl);
            const row = document.createElement('div');
            row.style.cssText = 'display:flex; flex-wrap:wrap; gap:4px;';
            cat.cards.forEach(c => {
                if (!isCardActive(c)) return;
                const b = document.createElement('button');
                b.className = 'modal-player-btn' + (picked.has(c) ? ' selected' : '');
                b.style.cssText += '; padding:4px 8px; font-size:0.85rem;';
                b.textContent = c;
                b.onclick = () => {
                    if (picked.has(c)) picked.delete(c); else picked.add(c);
                    renderCardPicker();
                };
                row.appendChild(b);
            });
            cardArea.appendChild(row);
        });
    };
    renderCardPicker();
    wrapper.appendChild(cardArea);

    showModal({
        title: `Mark ${name} Out`,
        body: wrapper,
        buttons: [
            { label: 'Cancel', action: () => hideModal() },
            { label: 'Mark Out', danger: true, confirmTwoTap: true, action: () => {
                hideModal();
                mutedPlayers.add(col);
                // Apply ✓ to any cards the player revealed (and auto-✗ rest of row).
                // Existing ✗ marks (if any) are preserved as historical record per the no-erase rule.
                picked.forEach(card => {
                    if (cellState[card] && cellState[card][col]) {
                        markCell(card, col, 'check');
                        if (typeof autoXRestOfRow === 'function') autoXRestOfRow(card, col);
                    }
                });
                applyPlayerOutBadges();
                renderAllCells();
                renderInfoBar();
                showStatus(`${name} is Out${picked.size ? ` (${picked.size} card${picked.size>1?'s':''} marked)` : ''}.`, 'var(--green-lt)');
                autoSave();
            } }
        ]
    });
}

// ═══════════════════════════════════════════════════════════════════
// M3: GAME DECK SAVE / LOAD
// Stores the structural config (categories, names, counts, card names).
// Up to 6 saved decks; last-used deck remembered between sessions.
// ═══════════════════════════════════════════════════════════════════
const DECK_KEY      = 'mtr_game_decks_v1';
const LAST_DECK_KEY = 'mtr_last_deck_v1';
const MAX_DECKS     = 6;
let lastUsedDeckIdx = -1;

function getSavedDecks() {
    try { return JSON.parse(localStorage.getItem(DECK_KEY)) || []; }
    catch { return []; }
}
function setSavedDecks(decks) { localStorage.setItem(DECK_KEY, JSON.stringify(decks)); }
function saveLastUsedDeck()   { localStorage.setItem(LAST_DECK_KEY, String(lastUsedDeckIdx)); }
function loadLastUsedDeck() {
    const v = parseInt(localStorage.getItem(LAST_DECK_KEY));
    lastUsedDeckIdx = isNaN(v) ? -1 : v;
}

function snapshotCurrentDeck(name) {
    // A Game Deck stores ONLY the Card-column data: category names, card names, and
    // the divider positions (implicit in the per-category cards array length).
    // Nothing else — no muted state, no marks, no notes, no player data.
    // This way loading a deck only swaps labels and never disturbs in-progress game state.
    return {
        name: (name || 'Deck').trim().slice(0, 24) || 'Deck',
        categories: CATEGORIES.map(c => ({ name:c.name, cards:[...c.cards] }))
    };
}

function saveGameDeck() {
    modalPrompt({
        title: 'Save Slot',
        message: 'Name this slot (6 chars max).',
        placeholder: 'Slot name',
        maxLength: 6,
        okLabel: 'Save',
        validate: (name) => {
            const trimmed = name.trim();
            if (!trimmed) return 'Slot name cannot be empty.';
            const decks = getSavedDecks();
            if (decks.some(d => d && d.name === trimmed)) return `Slot name "${trimmed}" already used.`;
            if (decks.length >= MAX_DECKS)                 return 'No more slots open.';
            return null;
        },
        onSubmit: (name) => {
            if (name === null) return;
            const trimmed = name.trim();
            const decks = getSavedDecks();
            decks.push(snapshotCurrentDeck(trimmed));
            _commitDeckSave(decks, decks.length - 1, trimmed);
        }
    });
}
function _commitDeckSave(decks, idx, name) {
    setSavedDecks(decks);
    lastUsedDeckIdx = idx;
    saveLastUsedDeck();
    renderDeckSlots();
    showDeckStatus(`Deck "${name}" saved (slot ${idx + 1}).`, 'var(--green-lt)');
}

function loadGameDeck(idx) {
    const decks = getSavedDecks();
    const deck = decks[idx];
    if (!deck) return;
    // Confirm every load — deck swap only touches category and card names, not marks/counts/etc.
    const proceed = () => { _doLoadGameDeck(idx, deck); };
    modalConfirm({
        title: 'Load Game Deck',
        message: `Load Game Deck "<strong>${deck.name}</strong>"? Only the category and card names will change — player names stay the same.`,
        okLabel: 'Load', confirmTwoTap: true, onConfirm: proceed
    });
}
function _doLoadGameDeck(idx, deck) {
    // ─────────────────────────────────────────────────────────────────────
    // Deck load swaps ONLY the Card-column data — category names and card names.
    // Everything else is preserved in place by POSITION:
    //   • cellState marks (including Me's ✓), per-row, per-column
    //   • cellNotes (per-cell mini-notes)
    //   • summaryMarks (∑ marks)
    //   • mutedCategoryIdxs, mutedCards, mutedPlayers — UNTOUCHED
    //   • playerNames, cardCounts, gameLog, turnCount, gamePhase — UNTOUCHED
    // ─────────────────────────────────────────────────────────────────────

    // 1) Capture every per-card state by ORDINAL POSITION (0..29) before we rename cards.
    const oldOrder = [...ALL_CARDS];
    const marksByPos = oldOrder.map(card => cellState[card] || null);
    const sumByPos   = oldOrder.map(card => summaryMarks[card] || '');
    const notesByPos = oldOrder.map(card => {
        const row = {};
        for (let col = 0; col < 6; col++) {
            const k = cellNoteKey(card, col);
            if (cellNotes[k]) row[col] = cellNotes[k];
        }
        return row;
    });

    // 2) Apply the new deck's names + divider positions.
    //    Tolerantly read old fat-format decks: only `categories[].name` and `categories[].cards`
    //    are consulted; any other field on the deck is ignored.
    const safeCats = Array.isArray(deck.categories) ? deck.categories : [];
    CATEGORIES = safeCats.map(c => ({
        name: (c && typeof c.name === 'string') ? c.name : 'Category',
        cards: Array.isArray(c && c.cards) ? [...c.cards] : []
    }));
    normalizeCategoryShape();
    rebuildAllCards();

    // 3) Rebuild cellState / cellNotes / summaryMarks keyed to the NEW card names,
    //    using the captured-by-position data so every mark stays where it was on the grid.
    const newCellState = {};
    const newCellNotes = {};
    const newSummary   = {};
    ALL_CARDS.forEach((card, i) => {
        // cellState — reuse the captured row if any, else fresh blanks.
        if (marksByPos[i]) {
            newCellState[card] = marksByPos[i];
        } else {
            newCellState[card] = {};
            for (let c = 0; c < 6; c++) {
                newCellState[card][c] = { check:false, cross:false, asked:false, showed:false, shownToMe:false, meShowedTo:'', iShowedMe:false, marks:[] };
            }
        }
        // cellNotes — copy the captured row back under the new card key.
        if (notesByPos[i]) {
            for (const col in notesByPos[i]) {
                newCellNotes[cellNoteKey(card, parseInt(col))] = notesByPos[i][col];
            }
        }
        // summaryMarks — copy the captured mark back under the new card key.
        if (sumByPos[i]) newSummary[card] = sumByPos[i];
    });
    cellState    = newCellState;
    cellNotes    = newCellNotes;
    summaryMarks = newSummary;

    // 4) Muted state, players, counts, gameLog, turn counters, gamePhase, undo stacks —
    //    ALL preserved. Per the new rule, deck load never touches in-progress game state.
    if (typeof meCol !== 'number' || meCol < 0) meCol = findMeCol();

    lastUsedDeckIdx = idx;
    saveLastUsedDeck();
    buildTable();
    renderAllCells(); renderFullLog(); renderInfoBar(); updateUndoButton();
    renderDeckSlots();
    autoSave();
    // M6: Each deck slot has its own Rules text — refresh the textarea to match.
    loadRulesForCurrentDeck();
    showDeckStatus(`Deck "${deck.name}" loaded — labels only; grid preserved.`, 'var(--green-lt)');
}

function deleteGameDeck(idx) {
    const decks = getSavedDecks();
    const deck = decks[idx];
    if (!deck) return;
    modalConfirm({
        title: 'Delete Game Deck',
        message: `Delete saved Game Deck "<strong>${deck.name}</strong>"? This cannot be undone.`,
        okLabel: 'Delete', danger: true, confirmTwoTap: true,
        onConfirm: () => {
            decks.splice(idx, 1);
            setSavedDecks(decks);
            if (lastUsedDeckIdx === idx)        lastUsedDeckIdx = -1;
            else if (lastUsedDeckIdx > idx)     lastUsedDeckIdx--;
            saveLastUsedDeck();
            renderDeckSlots();
            showDeckStatus(`Deck "${deck.name}" deleted.`, 'var(--gold-dk)');
        }
    });
}

function renderDeckSlots() {
    const container = document.getElementById('deckSlots');
    if (!container) return;
    container.innerHTML = '';
    const decks = getSavedDecks();
    for (let i = 0; i < MAX_DECKS; i++) {
        const deck = decks[i];
        const btn = document.createElement('button');
        if (deck) {
            btn.className = 'deck-slot' + (i === lastUsedDeckIdx ? ' active' : '');
            btn.textContent = deck.name;
            btn.title = `Load "${deck.name}". Right-click to delete.`;
            btn.onclick = () => loadGameDeck(i);
            btn.oncontextmenu = (e) => { e.preventDefault(); deleteGameDeck(i); };
        } else {
            btn.className = 'deck-slot empty';
            btn.textContent = (i+1) + '. Empty';
            btn.title = 'Click "Save Current" to fill an empty slot.';
        }
        container.appendChild(btn);
    }
}

function updateDeckBarVisibility() {
    // Deck Bar is now ALWAYS visible. Its contents swap based on phase:
    //   setup → deck slots / Save / hint / status (deck-setup-only)
    //   play  → the per-turn directive (deck-play-only) — relocated from header
    const bar = document.getElementById('deckBar');
    if (!bar) return;
    bar.classList.remove('hidden');
    bar.classList.toggle('play-mode', gamePhase !== 'setup');
}

// ═══════════════════════════════════════════════════════════════════
// M2: CONTEXT MENU — Right-click banners or card rows during setup
// ═══════════════════════════════════════════════════════════════════
function onContextMenu(e, target) {
    if (gamePhase !== 'setup') return; // banners/cards locked in play
    e.preventDefault();
    showCtxMenu(e.clientX, e.clientY, target);
}

let _ctxTarget = null, _ctxX = 0, _ctxY = 0;

function showCtxMenu(x, y, target) {
    _ctxTarget = target; _ctxX = x; _ctxY = y;
    renderCtxMenu();
}

function renderCtxMenu() {
    const menu = document.getElementById('ctxMenu');
    if (!menu || !_ctxTarget) return;
    menu.innerHTML = '';
    const items = buildCtxItems(_ctxTarget);
    items.forEach(it => {
        if (it.divider) { const d = document.createElement('div'); d.className = 'ctx-divider'; menu.appendChild(d); return; }
        const div = document.createElement('div');
        div.className = 'ctx-item' + (it.danger ? ' danger' : '') + (it.disabled ? ' ctx-disabled' : '');
        div.textContent = it.label;
        if (!it.disabled && it.action) {
            div.onclick = () => {
                it.action();
                if (it.stayOpen) renderCtxMenu();  // refresh in place for repeat actions
                else hideCtxMenu();
            };
        }
        menu.appendChild(div);
    });
    menu.classList.add('open');
    // Position, but keep on-screen
    const rect = menu.getBoundingClientRect();
    const xMax = window.innerWidth  - rect.width  - 4;
    const yMax = window.innerHeight - rect.height - 4;
    menu.style.left = Math.min(_ctxX, xMax) + 'px';
    menu.style.top  = Math.min(_ctxY, yMax) + 'px';
}

function hideCtxMenu() {
    const menu = document.getElementById('ctxMenu');
    if (menu) menu.classList.remove('open');
}

document.addEventListener('click',     hideCtxMenu);
document.addEventListener('contextmenu', e => {
    // If right-click happened outside a card-name TH / banner / player-header, close any open menu
    if (!e.target.closest('tr.cat-row, tr[data-card] > th, thead th[id^="th"]')) hideCtxMenu();
});

// M4: Right-click a player column header → open menu with Player-Out option
window.addEventListener('load', () => {
    // M5+ → 5.0.1: wire typing-undo capture on the static player-name + card-count inputs.
    for (let i = 1; i <= 6; i++) {
        const col = i - 1;
        const ph = document.getElementById('p'+i+'h');
        const cc = document.getElementById('p'+i+'c');
        if (ph) wireTypingInput(ph, (oldValue) => ({ type:'player-name', col, oldValue }));
        if (cc) wireTypingInput(cc, (oldValue) => ({ type:'card-count',  col, oldValue }));
    }
    // 5.0.1: Shift+Tab disabled globally — reverse-tab wandered into the page header / browser chrome.
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Tab' && e.shiftKey) e.preventDefault();
    });
    for (let col = 0; col < 6; col++) {
        const th = document.getElementById('th' + col);
        if (!th) continue;
        th.addEventListener('contextmenu', e => {
            if (gamePhase !== 'play') return; // only available during play
            e.preventDefault();
            const isOut = mutedPlayers.has(col);
            // Once a player is Out they stay Out — no menu, no path back.
            if (isOut) return;
            // Single-item menu for now; modal does the rest
            _ctxTarget = { kind:'player', col }; _ctxX = e.clientX; _ctxY = e.clientY;
            const menu = document.getElementById('ctxMenu');
            menu.innerHTML = '';
            const item = document.createElement('div');
            item.className = 'ctx-item danger';
            item.textContent = '👋 Mark player Out…';
            item.onclick = () => { hideCtxMenu(); openPlayerOutModal(col); };
            menu.appendChild(item);
            menu.classList.add('open');
            const rect = menu.getBoundingClientRect();
            const xMax = window.innerWidth - rect.width - 4;
            const yMax = window.innerHeight - rect.height - 4;
            menu.style.left = Math.min(_ctxX, xMax) + 'px';
            menu.style.top  = Math.min(_ctxY, yMax) + 'px';
        });
    }
});

function buildCtxItems(t) {
    const items = [];
    if (t.kind === 'banner') {
        const active = isCategoryActive(t.catIdx);
        items.push({ label:'✏ Rename category', action:() => focusCategoryName(t.catIdx) });
        items.push({ divider:true });
        items.push({ label:'⤴ Move banner up 1 row',
                     disabled: t.catIdx === 0 || CATEGORIES[t.catIdx - 1].cards.length <= 1,
                     stayOpen: true,
                     action:() => moveBannerUp(t.catIdx) });
        items.push({ label:'⤵ Move banner down 1 row',
                     disabled: t.catIdx === 0 || CATEGORIES[t.catIdx].cards.length <= 1,
                     stayOpen: true,
                     action:() => moveBannerDown(t.catIdx) });
        items.push({ divider:true });
        items.push({ label: active ? '🔇 Mute this category' : '🔊 Activate this category',
                     action:() => toggleCategoryActive(t.catIdx) });
    } else if (t.kind === 'card') {
        const active = isCardActive(t.card);
        items.push({ label: active ? '🔇 Mute this card' : '🔊 Activate this card',
                     action:() => toggleCardActive(t.card) });
    }
    return items;
}

// ── Helpers (setup only) ──
function focusCategoryName(catIdx) {
    const td = document.querySelector(`tr.cat-row[data-cat-idx="${catIdx}"] td`);
    const input = td && td.querySelector('input.cat-name-input');
    if (input) { input.focus(); input.select(); }
}

// ── Banner movement: shift one card across a category boundary ──
function moveBannerUp(catIdx) {
    // Banner X moves up 1 → takes the last card from category X-1 and prepends it to X
    if (catIdx === 0) return;
    const prev = CATEGORIES[catIdx - 1];
    const curr = CATEGORIES[catIdx];
    if (prev.cards.length <= 1) { showStatus('Category ' + (catIdx) + ' would have zero cards.', 'var(--red-lt)'); return; }
    const card = prev.cards.pop();
    curr.cards.unshift(card);
    onStructureChanged();
}
function moveBannerDown(catIdx) {
    // Banner X moves down 1 → takes the first card from category X and appends it to X-1
    if (catIdx === 0) return;
    const prev = CATEGORIES[catIdx - 1];
    const curr = CATEGORIES[catIdx];
    if (curr.cards.length <= 1) { showStatus('Category ' + (catIdx + 1) + ' would have zero cards.', 'var(--red-lt)'); return; }
    const card = curr.cards.shift();
    prev.cards.push(card);
    onStructureChanged();
}

// ── Active/muted toggles ──
function toggleCategoryActive(catIdx) {
    if (mutedCategoryIdxs.has(catIdx)) mutedCategoryIdxs.delete(catIdx);
    else                                mutedCategoryIdxs.add(catIdx);
    onStructureChanged();
}
function toggleCardActive(cardName) {
    if (mutedCards.has(cardName)) mutedCards.delete(cardName);
    else                          mutedCards.add(cardName);
    onStructureChanged();
}

function onStructureChanged() {
    rebuildAllCards();
    // Ensure cellState exists for every card; don't wipe existing entries
    ALL_CARDS.forEach(card => {
        if (!cellState[card]) {
            cellState[card] = {};
            for (let i = 0; i < 6; i++)
                cellState[card][i] = { check:false, cross:false, asked:false, showed:false, shownToMe:false, meShowedTo:'', iShowedMe:false };
        }
    });
    buildTable();
    renderAllCells();
    renderInfoBar();
    autoSave();
}
</script>
